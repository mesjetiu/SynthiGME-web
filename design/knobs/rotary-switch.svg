<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 200 200"
   width="200"
   height="200"
   version="1.1"
   id="rotarySwitchSvg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">

  <defs id="defs-rotary-switch">

    <!-- ===== GRADIENTES PARA LA BASE / ARANDELA METÁLICA ===== -->

    <!-- Gradiente radial de la base metálica -->
    <radialGradient id="rsBaseGradient" cx="48%" cy="42%" r="55%" fx="44%" fy="38%">
      <stop offset="0%" stop-color="#d8d8d8" stop-opacity="1"/>
      <stop offset="30%" stop-color="#c0c0c0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#a8a8a8" stop-opacity="1"/>
      <stop offset="85%" stop-color="#909090" stop-opacity="1"/>
      <stop offset="100%" stop-color="#787878" stop-opacity="1"/>
    </radialGradient>

    <!-- Sombra bajo la base -->
    <radialGradient id="rsBaseShadow" cx="50%" cy="52%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== GRADIENTES PARA EL CUERPO DEL SELECTOR ===== -->

    <!-- Gradiente radial del cuerpo cilíndrico oscuro -->
    <radialGradient id="rsBodyGradient" cx="45%" cy="40%" r="55%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="30%" stop-color="#404040"/>
      <stop offset="60%" stop-color="#303030"/>
      <stop offset="85%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>

    <!-- Reflejo especular del cuerpo -->
    <radialGradient id="rsBodySpecular" cx="40%" cy="35%" r="40%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== GRADIENTE PARA EL INDICADOR / MUESCA ===== -->

    <!-- Gradiente lineal para la línea indicadora -->
    <linearGradient id="rsIndicatorGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="40%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>

    <!-- ===== FILTROS ===== -->

    <!-- Sombra suave general -->
    <filter id="rsShadowFilter" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sombra para el cuerpo del selector -->
    <filter id="rsBodyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1.5" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadow">
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ============================================= -->
  <!-- GRUPO FIJO: BASE METÁLICA (rotary-switch-base)-->
  <!-- ============================================= -->
  <g id="rotary-switch-base">

    <!-- Sombra exterior -->
    <circle cx="100" cy="102" r="72" fill="url(#rsBaseShadow)" opacity="0.5"/>

    <!-- Arandela / placa base metálica -->
    <circle cx="100" cy="100" r="65"
            fill="url(#rsBaseGradient)"
            stroke="#777777" stroke-width="0.5"
            filter="url(#rsShadowFilter)"/>

    <!-- Bisel superior de la base (brillo) -->
    <path d="M 40,85 A 65,65 0 0,1 160,85"
          fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.3"
          stroke-linecap="round"/>

    <!-- Bisel inferior de la base (sombra) -->
    <path d="M 40,115 A 65,65 0 0,0 160,115"
          fill="none" stroke="#444444" stroke-width="1.0" opacity="0.25"
          stroke-linecap="round"/>

    <!-- Ranura / surco circular interior (reborde donde encaja el selector) -->
    <circle cx="100" cy="100" r="48"
            fill="none"
            stroke="#888888" stroke-width="1.2" opacity="0.5"/>
    <circle cx="100" cy="100" r="46"
            fill="none"
            stroke="#aaaaaa" stroke-width="0.5" opacity="0.3"/>

    <!-- Brillo especular sutil en la base -->
    <ellipse cx="85" cy="82" rx="22" ry="10"
             fill="#ffffff" opacity="0.1"
             transform="rotate(-20 85 82)"/>

  </g>

  <!-- ============================================= -->
  <!-- GRUPO MÓVIL: CUERPO DEL SELECTOR              -->
  <!-- (rotary-switch-knob)                           -->
  <!-- Posición por defecto: indicador apuntando      -->
  <!-- hacia la izquierda (-45°) = estado 'a'         -->
  <!-- Estado 'b': rotado a +45°                      -->
  <!-- ============================================= -->
  <g id="rotary-switch-knob" filter="url(#rsBodyShadow)">

    <!-- Cuerpo cilíndrico principal -->
    <circle cx="100" cy="100" r="38"
            fill="url(#rsBodyGradient)"
            stroke="#333333" stroke-width="0.5"/>

    <!-- Borde superior interior (bisel 3D) -->
    <path d="M 65,92 A 38,38 0 0,1 135,92"
          fill="none" stroke="#666666" stroke-width="0.8" opacity="0.4"
          stroke-linecap="round"/>

    <!-- Borde inferior interior (sombra 3D) -->
    <path d="M 65,108 A 38,38 0 0,0 135,108"
          fill="none" stroke="#111111" stroke-width="0.8" opacity="0.3"
          stroke-linecap="round"/>

    <!-- Reflejo especular del cuerpo -->
    <circle cx="100" cy="100" r="37"
            fill="url(#rsBodySpecular)"/>

    <!-- Cross-hatch / textura sutil (knurling simulado) -->
    <circle cx="100" cy="100" r="34"
            fill="none" stroke="#444444" stroke-width="0.3" opacity="0.15"
            stroke-dasharray="3 5"/>
    <circle cx="100" cy="100" r="30"
            fill="none" stroke="#444444" stroke-width="0.3" opacity="0.1"
            stroke-dasharray="2 6"/>

    <!-- ── INDICADOR DE POSICIÓN (línea / muesca blanca) ── -->
    <!-- Línea desde el centro hacia el borde, indicando la posición -->
    <line id="rotary-switch-indicator"
          x1="100" y1="100"
          x2="100" y2="65"
          stroke="url(#rsIndicatorGradient)"
          stroke-width="3.5"
          stroke-linecap="round"
          opacity="0.9"/>

    <!-- Muesca en el borde del cuerpo (marca táctil) -->
    <circle cx="100" cy="67" r="2.5"
            fill="#cccccc" opacity="0.5"/>

  </g>

</svg>

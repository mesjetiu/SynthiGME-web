<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  Knob Selector — Selector rotativo de 5 posiciones para Envelope Shaper
  
  Basado en knob.svg del Synthi 100 (Cuenca/Datanomics 1982).
  Diferencias con knob.svg:
  - Sin escala numérica (las opciones van serigrafiadas en el panel)
  - Usa un triángulo/flecha como indicador de posición en lugar de muesca ovalada
  - 5 posiciones discretas: GATED F/R, FREE RUN, GATED, TRIGGERED, HOLD
  
  El ángulo de rotación se controla externamente via CSS transform.
-->
<svg
   viewBox="0 0 200 200"
   width="200"
   height="200"
   version="1.1"
   id="selectorKnobSvg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">

  <defs id="defs-selector">
    <!-- Gradiente de iluminación (mismo que knob.svg) -->
    <radialGradient
       id="selectorGradient"
       cx="100" cy="100" r="50"
       fx="80" fy="80"
       gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:black;stop-opacity:0.2" />
    </radialGradient>

    <!-- Muesca redonda para textura del grip (igual que knob.svg) -->
    <ellipse
       id="SelectorMuesca"
       cx="100" cy="38"
       rx="9" ry="12"
       fill="#222222" />
  </defs>

  <g id="KNOB_SELECTOR">

    <!-- Halo exterior sutil (zona de interacción visual) -->
    <circle
       cx="100" cy="100" r="100"
       fill="#a1a1a1" fill-opacity="0.525732"
       stroke="none" />

    <!-- ===== GRIP (cuerpo del knob, escalado como knob.svg) ===== -->
    <g id="SelectorGrip"
       transform="matrix(0.86206897,0,0,0.86206897,13.793103,13.793103)">

      <!-- Círculo principal oscuro -->
      <circle cx="100" cy="100" r="64.21"
              fill="#222222" stroke="#000000" stroke-width="0.99" />

      <!-- 12 muescas radiales (textura knurling) -->
      <use href="#SelectorMuesca" />
      <use href="#SelectorMuesca" transform="rotate(30,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(60,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(90,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(120,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(150,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(180,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(-150,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(-120,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(-90,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(-60,100,100)" />
      <use href="#SelectorMuesca" transform="rotate(-30,100,100)" />

      <!-- Borde interior limpio -->
      <circle cx="100" cy="100" r="58"
              fill="none" stroke="#222222" stroke-width="4" />
    </g>

    <!-- ===== INDICADOR: Triángulo / Flecha ===== -->
    <!-- Triángulo apuntando hacia arriba (12 o'clock), 
         la rotación CSS lo moverá a la posición deseada.
         Posicionado en el borde exterior del grip. -->
    <polygon
       id="selector-arrow"
       points="100,22 93,38 107,38"
       fill="#ffffff"
       stroke="#cccccc"
       stroke-width="0.5"
       opacity="0.95" />

  </g>
</svg>
